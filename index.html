    <script>
      // Fix file:// - history.replaceState/pushState SecurityError
      (function() {
        var _origReplace = history.replaceState.bind(history);
        var _origPush = history.pushState.bind(history);
        function safe(orig) {
          return function(state, title, url) {
            try { return orig(state, title, url); } catch(e) { /* ignore SecurityError on file:// */ }
          };
        }
        history.replaceState = safe(_origReplace);
        history.pushState = safe(_origPush);
      })();

      // Fix file:// - desativa service worker (dynamic import falha com file://)
      try {
        Object.defineProperty(navigator, 'serviceWorker', { get: function() { return undefined; } });
      } catch(e) {}

      // Bloqueia todas as requisições externas para funcionar offline
      const _origFetch = window.fetch;
      window.fetch = function(url, opts) {
        if (typeof url === 'string' && url.startsWith('http') && !url.startsWith('http://127.') && !url.startsWith('http://localhost')) {
          console.log('[offline] fetch bloqueado:', url);
          return Promise.reject(new Error('offline'));
        }
        return _origFetch.apply(this, arguments);
      };
      const _origXHR = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (typeof url === 'string' && url.startsWith('http') && !url.startsWith('http://127.') && !url.startsWith('http://localhost')) {
          console.log('[offline] XHR bloqueado:', url);
          url = 'about:blank';
        }
        return _origXHR.apply(this, arguments);
      };
